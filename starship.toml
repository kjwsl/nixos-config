## MODERN CROSS-SHELL PROMPT WITH JUJUTSU SUPPORT
## Ultra-fast, beautiful, and feature-rich prompt

# Use custom format with Jujutsu support
format = """
[‚ē≠‚ĒÄ](bold blue)\
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$git_state\
$custom.jj_status\
$custom.jj_branch\
$fill\
$nix_shell\
$docker_context\
$python\
$nodejs\
$rust\
$golang\
$cmd_duration\
$time\
[](bold blue)
[‚ēį‚ĒÄ](bold blue)$character"""

# Palette - Modern Nord-inspired theme
palette = "modern"

[palettes.modern]
bg_dark = "#2E3440"
bg_light = "#3B4252"
fg = "#ECEFF4"
accent = "#88C0D0"
accent2 = "#81A1C1"
success = "#A3BE8C"
warning = "#EBCB8B"
error = "#BF616A"
purple = "#B48EAD"
orange = "#D08770"

# Blank line before prompt
add_newline = true

# Username (show always for clarity)
[username]
format = "[ $user](bold $style) "
style_user = "blue"
style_root = "red bold"
show_always = false
disabled = false

# Hostname
[hostname]
ssh_only = true
format = "[@$hostname](bold yellow) "
disabled = false

# Directory - Clean and prominent
[directory]
format = "[ $path]($style)[$read_only]($read_only_style) "
style = "bold cyan"
truncation_length = 3
truncate_to_repo = true
read_only = " ůįĆĺ"
read_only_style = "red"
home_symbol = "~"

[directory.substitutions]
"Documents" = "ůįąô "
"Downloads" = " "
"Music" = " "
"Pictures" = " "

# Git Branch - Modern icons
[git_branch]
format = "[ $symbol$branch(:$remote_branch)]($style) "
symbol = " "
style = "bold purple"
truncation_length = 20
truncation_symbol = "‚Ä¶"

# Git Status - Comprehensive
[git_status]
format = "([$all_status$ahead_behind]($style) )"
style = "bold red"
conflicted = "‚öĒÔłŹ "
ahead = "‚á°${count} "
behind = "‚á£${count} "
diverged = "‚áē‚á°${ahead_count}‚á£${behind_count} "
up_to_date = "‚úď"
untracked = "?${count} "
stashed = "ůįŹó ${count} "
modified = "!${count} "
staged = "+${count} "
renamed = "¬Ľ${count} "
deleted = "‚úė${count} "
windows_starship = "/mnt/c/Users/username/scoop/apps/starship/current/starship.exe"

# Git State
[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bold yellow"
rebase = "REBASING"
merge = "MERGING"
revert = "REVERTING"
cherry_pick = "CHERRY-PICKING"
bisect = "BISECTING"
am = "AM"
am_or_rebase = "AM/REBASE"

# Git Commit
[git_commit]
commit_hash_length = 7
format = "[\\($hash$tag\\)]($style) "
style = "green bold"
only_detached = true
tag_disabled = false
tag_symbol = " ūüŹ∑  "

# Jujutsu Branch - Custom module via jj-starship
[custom.jj_branch]
when = "jj workspace root --ignore-working-copy"
command = "jj log -r @ --no-graph -T 'bookmarks.join(\", \")'"
format = "[  $output]($style) "
style = "bold magenta"
description = "Show current Jujutsu branch/bookmark"

# Jujutsu Status - Custom module via jj-starship
[custom.jj_status]
when = "jj workspace root --ignore-working-copy"
command = '''
jj-starship status || echo ""
'''
format = "[$output]($style) "
style = "bold yellow"
description = "Show Jujutsu repository status"

# Fill - Spacer between left and right
[fill]
symbol = " "
style = "bold green"

# Command Duration - Show if > 2s
[cmd_duration]
min_time = 2_000
format = "[ $duration]($style) "
style = "bold yellow"
show_milliseconds = false
show_notifications = false

# Time - Always show
[time]
disabled = false
format = "[ $time]($style) "
style = "bold white"
time_format = "%T"
utc_time_offset = "local"

# Character - Different for success/error
[character]
success_symbol = "[‚ĚĮ](bold green)"
error_symbol = "[‚ĚĮ](bold red)"
vimcmd_symbol = "[‚Ěģ](bold green)"

# Line break
[line_break]
disabled = false

# Status - Show exit code
[status]
disabled = false
format = "[$symbol$status]($style) "
symbol = "‚úĖ "
success_symbol = ""
not_executable_symbol = "ūüöę "
not_found_symbol = "ūüĒć "
sigint_symbol = "ūüßĪ "
signal_symbol = "‚ö° "
style = "bold red"
map_symbol = true

# Jobs - Background jobs indicator
[jobs]
symbol = " "
style = "bold blue"
number_threshold = 1
symbol_threshold = 1
format = "[$symbol$number]($style) "

# Battery - Show if < 30%
[battery]
full_symbol = "ůįĀĻ "
charging_symbol = "ůįāĄ "
discharging_symbol = "ůįāÉ "
unknown_symbol = "ůįĀĹ "
empty_symbol = "ůįāé "
format = "[$symbol$percentage]($style) "

[[battery.display]]
threshold = 10
style = "bold red"

[[battery.display]]
threshold = 30
style = "bold yellow"

# Container - Show if in container
[container]
format = "[$symbol \\[$name\\]]($style) "
symbol = "‚¨Ę"
style = "red bold dimmed"

# Nix Shell
[nix_shell]
format = "[ $symbol$state( \\($name\\))]($style) "
symbol = "ůĪĄÖ "
style = "bold blue"
impure_msg = "[impure](bold red)"
pure_msg = "[pure](bold green)"
unknown_msg = "[unknown](bold yellow)"

# Docker Context
[docker_context]
symbol = " "
format = "[$symbol$context]($style) "
style = "blue bold"
only_with_files = true
detect_files = ["docker-compose.yml", "docker-compose.yaml", "Dockerfile"]

# Language-specific modules (Modern icons)

[nodejs]
symbol = " "
format = "[$symbol($version )]($style)"
style = "bold green"
detect_files = ["package.json", ".node-version", ".nvmrc"]
detect_folders = ["node_modules"]

[python]
